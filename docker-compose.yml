services:
  app:
    build: .
    restart: always
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: ${DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${DATABASE_USERNAME:-atlasdbuser}
      SPRING_DATASOURCE_PASSWORD: ${DATABASE_PASSWORD}
      
      # Spring Boot maps these automatically if prefixed
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-atlas-db}
      POSTGRES_USER: ${DATABASE_USERNAME:-atlasdbuser}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DATABASE_USERNAME:-atlasdbuser} -d $${DATABASE_NAME:-atlas-db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    restart: always
    environment:
      ADMINER_DEFAULT_SERVER: db
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Adminer serves the login page at the root URL (/) on port 8080
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pg_data: