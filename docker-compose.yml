services:
  app:
    build: .
    restart: always
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: ${DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${DATABASE_USERNAME:-atlasdbuser}
      SPRING_DATASOURCE_PASSWORD: ${DATABASE_PASSWORD}
      
      # Spring Boot maps these automatically if prefixed
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-atlas-db}
      POSTGRES_USER: ${DATABASE_USERNAME:-atlasdbuser}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DATABASE_USERNAME:-atlasdbuser} -d $${DATABASE_NAME:-atlas-db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      # The credentials you will use to log into the pgAdmin web interface
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@simpawebtec.store}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-securepassword123}
    expose:
      - "80"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # wget is used instead of curl because the pgadmin image is Alpine-based
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pg_data: